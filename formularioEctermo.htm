<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
 <script src="script.js" defer ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agendamento</title>
</head>
<body>
     <!-- SEÇÃO 4 - AGENDAMENTO  -->

  <section id="secao4">
    <h1>Agendamento Online</h1>
    <form action="" method="post" class="form-agendamento">
      <h2 id="titulo-agendamento">
        Preencha seus dados e escolha um dia e horário
      </h2>

      <label for="nome">Nome:</label>
      <input type="text" id="nome" />

      <label for="email">E-mail:</label>
      <input type="email" id="email" />

      <label for="telefone">Telefone:</label>
      <input type="tel" id="telefone" />

      <label for="data-agendamento">Data do Agendamento:</label>
      <input type="date" id="data-agendamento" />

      <label for="hora-agendamento">Horário do Agendamento:</label>
      <input type="time" id="hora-agendamento" />

      <label for="mensagem">Observação:</label>
      <textarea id="message" name="mensagem" rows="3"></textarea>

      <button id="botao-agendamento" type="submit">Agendar</button>
    </form>
  </section>
</body>
</html>
